<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>MosendPay Checkout</title>
<style>
  :root{
    --ink:#0E1116;--ink-2:#161B22;--ink-3:#1F2630;--line:#2A3340;
    --gold:#E8B43C;--gold-dim:#A8821F;--green:#3FB97A;--red:#E5604D;--amber:#E0A23C;
    --text:#E8EAED;--muted:#9AA4B2;--muted-2:#6B7585;
    --mono:ui-monospace,'SFMono-Regular',Menlo,Consolas,monospace;
    --sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:
    radial-gradient(130% 100% at 50% 0%, rgba(232,180,60,.07), transparent 50%),var(--ink);
    color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased;
    min-height:100vh;display:grid;place-items:center;padding:20px}
  .mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
  .card{width:100%;max-width:400px;background:var(--ink-2);border:1px solid var(--line);
    border-radius:18px;overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,.4)}
  .head{padding:22px 24px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
  .dot{width:24px;height:24px;border-radius:7px;background:linear-gradient(135deg,var(--gold),var(--gold-dim));
    display:grid;place-items:center;color:var(--ink);font-weight:800;font-family:var(--mono);font-size:14px}
  .head b{font-weight:600;letter-spacing:-.01em}
  .head small{color:var(--muted);font-size:12px;display:block;margin-top:1px}
  .body{padding:24px}
  .merchant{font-size:13px;color:var(--muted);margin-bottom:4px}
  .amt{font-family:var(--mono);font-size:38px;letter-spacing:-.02em;margin:2px 0 2px}
  .amt .cur{font-size:18px;color:var(--muted);margin-right:6px}
  .desc{color:var(--muted);font-size:14px;margin-bottom:22px}
  label{display:block;font-size:12px;color:var(--muted);text-transform:uppercase;
    letter-spacing:.06em;margin:0 0 7px}
  input,select{width:100%;background:var(--ink);border:1px solid var(--line);border-radius:11px;
    padding:13px 14px;color:var(--text);font:inherit;outline:none;transition:.15s}
  input:focus,select:focus{border-color:var(--gold-dim);box-shadow:0 0 0 3px rgba(232,180,60,.1)}
  .row{display:grid;grid-template-columns:1fr 1.3fr;gap:10px;margin-bottom:18px}
  .pay{width:100%;border:none;border-radius:12px;padding:15px;font:inherit;font-weight:600;
    font-size:16px;background:var(--gold);color:var(--ink);cursor:pointer;transition:.15s;
    display:flex;align-items:center;justify-content:center;gap:8px}
  .pay:hover{filter:brightness(1.06)}
  .pay:disabled{opacity:.6;cursor:not-allowed}
  .secure{text-align:center;font-size:12px;color:var(--muted-2);margin-top:16px}
  .secure b{color:var(--gold-dim)}
  .state{text-align:center;padding:14px 0 2px}
  .state .ic{font-size:42px;margin-bottom:8px}
  .state h2{margin:0 0 4px;font-size:20px}
  .state p{margin:0;color:var(--muted);font-size:14px}
  .spin{width:16px;height:16px;border:2px solid rgba(14,17,22,.35);border-top-color:var(--ink);
    border-radius:50%;animation:s .7s linear infinite}
  @keyframes s{to{transform:rotate(360deg)}}
  .pulse{width:54px;height:54px;border:3px solid var(--line);border-top-color:var(--gold);
    border-radius:50%;animation:s 1s linear infinite;margin:0 auto 14px}
  .err{color:var(--red);font-size:13px;text-align:center;margin-top:12px;min-height:16px}
  .hint{font-size:11px;color:var(--muted-2);margin-top:6px}
</style>
</head>
<body>
<div class="card">
  <div class="head"><span class="dot">M</span>
    <div><b>MosendPay</b><small>Secure checkout</small></div></div>
  <div class="body" id="app">
    <div class="state"><div class="pulse"></div><p>Loading…</p></div>
  </div>
</div>
<script>
const API = location.origin;
const sessionId = location.pathname.split('/').pop();
const app = document.getElementById('app');
let session = null;

async function load(){
  try{
    const r = await fetch(`${API}/v1/checkout/sessions/${sessionId}`);
    session = await r.json();
    if(!r.ok) throw new Error(session?.error?.message || 'Session not found');
    if(session.expired && session.status!=='completed') return renderExpired();
    if(session.status==='completed') return renderDone();
    renderForm();
  }catch(e){ renderError(e.message); }
}

function renderForm(){
  app.innerHTML = `
    <div class="merchant">Paying ${esc(session.businessName||'Merchant')}</div>
    <div class="amt"><span class="cur">${session.currency}</span>${session.amount_ghs}</div>
    <div class="desc">${esc(session.description||'')}</div>
    <div class="row">
      <div><label>Network</label>
        <select id="prov">
          <option value="mtn">MTN</option>
          <option value="telecel">Telecel</option>
          <option value="airteltigo">AirtelTigo</option>
        </select></div>
      <div><label>MoMo number</label>
        <input id="msisdn" inputmode="numeric" placeholder="0240000002" maxlength="10"/></div>
    </div>
    <button class="pay" id="payBtn">Pay ${session.currency} ${session.amount_ghs}</button>
    <div class="hint">Demo: a number ending in an even digit approves; odd digit declines.</div>
    <div class="err" id="err"></div>
    <div class="secure">🔒 Secured by <b>MosendPay</b></div>`;
  document.getElementById('payBtn').onclick = pay;
}

async function pay(){
  const btn = document.getElementById('payBtn');
  const msisdn = document.getElementById('msisdn').value.trim();
  const provider = document.getElementById('prov').value;
  const err = document.getElementById('err');
  err.textContent='';
  if(!/^0\d{9}$/.test(msisdn)){ err.textContent='Enter a valid 10-digit MoMo number.'; return; }
  btn.disabled=true; btn.innerHTML='<span class="spin"></span> Sending request…';
  try{
    const r = await fetch(`${API}/v1/checkout/sessions/${sessionId}/pay`,{
      method:'POST',headers:{'content-type':'application/json'},
      body:JSON.stringify({msisdn,provider})
    });
    const d = await r.json();
    if(!r.ok) throw new Error(d?.error?.message||'Payment failed');
    renderPending();
    poll();
  }catch(e){ btn.disabled=false; btn.textContent='Try again'; err.textContent=e.message; }
}

function renderPending(){
  app.innerHTML = `<div class="state"><div class="pulse"></div>
    <h2>Approve on your phone</h2>
    <p>We sent a prompt to authorise ${session.currency} ${session.amount_ghs}. Waiting for confirmation…</p></div>`;
}

let tries=0;
async function poll(){
  tries++;
  try{
    const r = await fetch(`${API}/v1/checkout/sessions/${sessionId}/status`);
    const d = await r.json();
    if(d.status==='completed' || d.paymentStatus==='succeeded') return renderDone();
    if(d.paymentStatus==='failed') return renderFailed();
  }catch(e){}
  if(tries<20) setTimeout(poll,1200); else renderFailed('timed out');
}

function renderDone(){
  app.innerHTML = `<div class="state">
    <div class="ic" style="color:var(--green)">✓</div>
    <h2>Payment successful</h2>
    <p>${session.currency} ${session.amount_ghs} paid to ${esc(session.businessName||'the merchant')}.</p></div>`;
  if(session.success_url){ setTimeout(()=>location.href=session.success_url,1800); }
}
function renderFailed(reason){
  app.innerHTML = `<div class="state">
    <div class="ic" style="color:var(--red)">✕</div>
    <h2>Payment failed</h2>
    <p>${reason||'The payment was declined.'} </p></div>
    <button class="pay" onclick="location.reload()" style="margin-top:16px">Try again</button>`;
}
function renderExpired(){
  app.innerHTML = `<div class="state"><div class="ic" style="color:var(--amber)">⏰</div>
    <h2>Session expired</h2><p>Ask the merchant for a new payment link.</p></div>`;
}
function renderError(m){
  app.innerHTML = `<div class="state"><div class="ic" style="color:var(--red)">✕</div>
    <h2>Something went wrong</h2><p>${esc(m)}</p></div>`;
}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
load();
</script>
</body>
</html>
