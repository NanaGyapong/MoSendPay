<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>MosendPay — Send Money to Ghana</title>
<style>
  :root{
    --ink:#0E1116;--ink-2:#161B22;--ink-3:#1F2630;--line:#2A3340;
    --gold:#E8B43C;--gold-dim:#A8821F;--green:#3FB97A;--red:#E5604D;
    --text:#E8EAED;--muted:#9AA4B2;--muted-2:#6B7585;
    --mono:ui-monospace,'SFMono-Regular',Menlo,Consolas,monospace;
    --sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:
    radial-gradient(130% 100% at 50% 0%, rgba(232,180,60,.08), transparent 50%),var(--ink);
    color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased;
    min-height:100vh;display:grid;place-items:center;padding:20px}
  .mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
  .card{width:100%;max-width:440px;background:var(--ink-2);border:1px solid var(--line);
    border-radius:20px;overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,.45)}
  .head{padding:22px 26px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:11px}
  .dot{width:26px;height:26px;border-radius:8px;background:linear-gradient(135deg,var(--gold),var(--gold-dim));
    display:grid;place-items:center;color:var(--ink);font-weight:800;font-family:var(--mono);font-size:15px}
  .head b{font-weight:600;letter-spacing:-.01em;font-size:17px}
  .head small{color:var(--muted);font-size:12px;display:block;margin-top:1px}
  .body{padding:26px}
  .lead{color:var(--muted);font-size:14px;margin:0 0 22px;line-height:1.5}
  label{display:block;font-size:12px;color:var(--muted);text-transform:uppercase;
    letter-spacing:.06em;margin:0 0 8px}
  .send-row{display:grid;grid-template-columns:1.6fr 1fr;gap:10px;margin-bottom:6px}
  input,select{width:100%;background:var(--ink);border:1px solid var(--line);border-radius:12px;
    padding:15px 14px;color:var(--text);font:inherit;font-size:18px;outline:none;transition:.15s;
    font-family:var(--mono)}
  select{font-family:var(--sans);font-size:15px}
  input:focus,select:focus{border-color:var(--gold-dim);box-shadow:0 0 0 3px rgba(232,180,60,.1)}
  .arrow{display:flex;align-items:center;justify-content:center;color:var(--muted-2);
    font-size:22px;margin:14px 0}
  .receive{background:
    radial-gradient(120% 140% at 100% 0%, rgba(63,185,122,.12), transparent 55%),var(--ink-3);
    border:1px solid var(--green);border-radius:14px;padding:20px;margin-bottom:18px}
  .receive .k{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
  .receive .v{font-family:var(--mono);font-size:34px;letter-spacing:-.02em;margin-top:8px;color:var(--green)}
  .receive .v .cur{font-size:17px;color:var(--muted);margin-right:6px}
  .rate{display:flex;justify-content:space-between;font-size:13px;color:var(--muted);
    margin-top:14px;padding-top:14px;border-top:1px solid var(--line)}
  .rate b{color:var(--text);font-family:var(--mono)}
  .recipient{margin-bottom:18px}
  .cta{width:100%;border:none;border-radius:13px;padding:16px;font:inherit;font-weight:600;
    font-size:16px;background:var(--gold);color:var(--ink);cursor:pointer;transition:.15s}
  .cta:hover{filter:brightness(1.06)}
  .secure{text-align:center;font-size:12px;color:var(--muted-2);margin-top:16px}
  .secure b{color:var(--gold-dim)}
  .spin{display:inline-block;width:14px;height:14px;border:2px solid var(--line);
    border-top-color:var(--green);border-radius:50%;animation:s .7s linear infinite;vertical-align:middle}
  @keyframes s{to{transform:rotate(360deg)}}
  .demo{background:rgba(232,180,60,.08);border:1px solid var(--gold-dim);color:var(--gold);
    font-size:12px;padding:9px 14px;border-radius:10px;margin-top:16px;text-align:center}
  .done{text-align:center;padding:18px 0}
  .done .ic{font-size:44px;color:var(--green);margin-bottom:8px}
  .done h2{margin:0 0 6px;font-size:21px}
  .done p{margin:0;color:var(--muted);font-size:14px;line-height:1.5}
</style>
</head>
<body>
<div class="card">
  <div class="head"><span class="dot">M</span>
    <div><b>MosendPay</b><small>Send money to Ghana</small></div></div>
  <div class="body" id="app">
    <p class="lead">Send money home in seconds. Your family receives Mobile Money instantly, at a fair rate.</p>

    <label>You send</label>
    <div class="send-row">
      <input id="amount" class="mono" inputmode="decimal" value="100" />
      <select id="from">
        <option value="GBP">GBP &#163;</option>
        <option value="USD">USD &#36;</option>
        <option value="EUR">EUR &#8364;</option>
      </select>
    </div>

    <div class="arrow">&#8595;</div>

    <div class="receive">
      <div class="k">They receive</div>
      <div class="v"><span class="cur">GHS</span><span id="recvAmt">&#8212;</span></div>
      <div class="rate">
        <span>Rate: <b id="rate">&#8212;</b></span>
        <span>Fee: <b>in the rate</b></span>
      </div>
    </div>

    <div class="recipient">
      <label>Recipient MoMo number (Ghana)</label>
      <input id="msisdn" class="mono" inputmode="numeric" placeholder="0240000000" maxlength="10"/>
    </div>

    <button class="cta" id="cta">Continue</button>
    <div class="demo">Demo &#8212; live conversion shown. No real money moves yet.</div>
    <div class="secure" style="margin-top:14px">Secured by <b>MosendPay</b> &#183; rates lock at confirmation</div>
  </div>
</div>
<script>
const API = location.protocol.startsWith('http') ? location.origin : 'http://localhost:4000';
const $ = id => document.getElementById(id);
let debounce;

async function refresh(){
  const amount = parseFloat($('amount').value);
  const from = $('from').value;
  if(!amount || amount<=0){ $('recvAmt').textContent='\u2014'; $('rate').textContent='\u2014'; return; }
  $('recvAmt').innerHTML='<span class="spin"></span>';
  try{
    const r = await fetch(API + '/v1/fx/quote?from=' + from + '&to=GHS&amount=' + amount);
    const d = await r.json();
    if(!r.ok) throw new Error((d && d.error && d.error.message) || 'quote failed');
    $('recvAmt').textContent = Number(d.recipient_amount).toLocaleString('en-GH',{minimumFractionDigits:2,maximumFractionDigits:2});
    $('rate').textContent = '1 ' + from + ' = ' + d.rate + ' GHS';
  }catch(e){ $('recvAmt').textContent='\u2014'; $('rate').textContent='unavailable'; }
}

['amount','from'].forEach(function(id){
  $(id).addEventListener('input', function(){ clearTimeout(debounce); debounce=setTimeout(refresh,250); });
});

$('cta').addEventListener('click', function(){
  const msisdn=$('msisdn').value.trim();
  const amount=$('amount').value, from=$('from').value;
  const recv=$('recvAmt').textContent;
  if(!/^0\d{9}$/.test(msisdn)){ alert('Enter a valid 10-digit Ghana MoMo number.'); return; }
  $('app').innerHTML='<div class="done"><div class="ic">&#10003;</div>'+
    '<h2>Transfer ready</h2>'+
    '<p>'+from+' '+amount+' \u2192 GHS '+recv+'<br>to '+msisdn+'</p>'+
    '<p style="margin-top:16px;color:var(--muted-2);font-size:13px">This is a demo. In the live product you would confirm and pay here, and the recipient would receive Mobile Money instantly.</p></div>';
});

refresh();
</script>
</body>
</html>
